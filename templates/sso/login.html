<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if app %}{{ app.app_name }} — {% endif %}Login · SSO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:linear-gradient(135deg,#0f1117 0%,#1a1d27 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-wrap { width:100%; max-width:420px; padding:16px; }
    .card { background:#1a1d27; border:1px solid #2e3248; border-radius:14px; }
    .logo-icon { width:56px; height:56px; border-radius:14px; background:linear-gradient(135deg,#6c63ff,#8b5cf6); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:26px; color:#fff; margin:0 auto 14px; box-shadow:0 8px 24px rgba(108,99,255,.35); }
    .form-control, .form-control:focus {
      background:#0f1117; border-color:#2e3248; color:#e2e8f0;
    }
    .form-control:focus { border-color:#6c63ff; box-shadow:0 0 0 3px rgba(108,99,255,.15); }
    .form-control::placeholder { color:#4a5568; }
    .form-label { color:#94a3b8; font-size:12.5px; font-weight:600; }
    .btn-login { background:linear-gradient(135deg,#6c63ff,#8b5cf6); border:none; padding:11px; font-weight:600; font-size:15px; box-shadow:0 4px 16px rgba(108,99,255,.3); }
    .btn-login:hover { opacity:.9; }
    .app-badge { background:rgba(108,99,255,.12); border:1px solid rgba(108,99,255,.2); border-radius:10px; padding:10px 14px; }
    .dot-pulse { width:8px; height:8px; border-radius:50%; background:#6c63ff; animation:pulse 2s infinite; display:inline-block; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    h5,p { color:#e2e8f0; }
    .text-muted { color:#64748b !important; }
    .powered { color:#4a5568; font-size:11.5px; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="card p-4 shadow-lg">
    <div class="text-center mb-4">
      <div class="logo-icon">S</div>
      <h5 class="fw-bold mb-1">Selamat Datang</h5>
      <p class="text-muted small mb-0">Masuk untuk melanjutkan</p>
    </div>

    {% if app %}
    <div class="app-badge d-flex align-items-center gap-2 mb-3">
      <span class="dot-pulse"></span>
      <span style="font-size:13px;color:#e2e8f0">
        Login ke <strong>{{ app.app_name }}</strong>
        {% if app.auto_redirect %}
          <span style="color:#6c63ff;font-size:11px"> · auto-redirect</span>
        {% endif %}
      </span>
    </div>
    {% endif %}

    {% if error %}
    <div class="alert alert-danger py-2 d-flex align-items-center gap-2" style="font-size:13px">
      <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <input type="hidden" name="app_id" value="{{ app_id or '' }}">
      <input type="hidden" name="redirect" value="{{ redirect_to or '' }}">
      <div class="mb-3">
        <label class="form-label">Username atau Email</label>
        <input type="text" name="username" class="form-control"
               placeholder="username atau email" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-login btn-primary w-100">
        Masuk <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </form>

    <div class="text-center mt-4 powered">
      <i class="bi bi-shield-lock me-1"></i>
      Diamankan oleh <strong style="color:#94a3b8">MySSO</strong>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
