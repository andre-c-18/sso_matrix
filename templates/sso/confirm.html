<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konfirmasi Login · SSO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:linear-gradient(135deg,#0f1117,#1a1d27); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#1a1d27; border:1px solid #2e3248; border-radius:14px; width:100%; max-width:460px; }
    .check-circle { width:60px; height:60px; border-radius:50%; background:rgba(16,185,129,.15); border:2px solid rgba(16,185,129,.3); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 16px; }
    h5,p,.fw-semibold { color:#e2e8f0; }
    .text-muted { color:#64748b !important; }
    .info-box { background:#0f1117; border:1px solid #2e3248; border-radius:10px; }
    code { background:#1a1d27; border:1px solid #2e3248; color:#a5b4fc; padding:2px 8px; border-radius:4px; font-size:11px; word-break:break-all; }
  </style>
</head>
<body>
<div class="p-3" style="max-width:460px;width:100%;margin:auto">
  <div class="card p-4 shadow-lg">
    <div class="text-center mb-4">
      <div class="check-circle">✓</div>
      <h5 class="fw-bold mb-1">Login Berhasil!</h5>
      <p class="text-muted small">Anda akan diarahkan ke <strong style="color:#e2e8f0">{{ app.app_name }}</strong></p>
    </div>

    <div class="info-box p-3 mb-3">
      <div class="row g-2 small">
        <div class="col-5 text-muted fw-semibold">User</div>
        <div class="col-7 fw-semibold" style="color:#e2e8f0">{{ user.full_name }}</div>
        <div class="col-5 text-muted fw-semibold">Role</div>
        <div class="col-7">
          <span class="badge
            {% if user.role_name=='superadmin' %}text-bg-danger
            {% elif user.role_name=='admin' %}text-bg-warning text-dark
            {% elif user.role_name=='manager' %}text-bg-success
            {% else %}text-bg-secondary{% endif %}">
            {{ user.role_name }}
          </span>
        </div>
        <div class="col-5 text-muted fw-semibold">Token Valid</div>
        <div class="col-7" style="color:#e2e8f0">{{ token_data.expires_in // 60 }} menit</div>
      </div>
    </div>

    <div class="info-box p-3 mb-3 position-relative">
      <div class="text-muted small fw-semibold mb-1">Access Token</div>
      <code>{{ token_data.access_token[:80] }}...</code>
      <button class="btn btn-sm btn-outline-secondary position-absolute top-0 end-0 m-2"
              onclick="navigator.clipboard.writeText('{{ token_data.access_token }}');this.textContent='✓'"
              style="font-size:11px">Copy</button>
    </div>

    <a href="{{ full_url }}" class="btn btn-primary w-100 mb-2">
      Lanjutkan ke {{ app.app_name }} <i class="bi bi-arrow-right ms-1"></i>
    </a>
    <a href="/sso/logout" class="btn btn-outline-secondary w-100">Batal / Logout</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
