<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · SSO Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#f0f2f5; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { width:100%; max-width:380px; }
    .logo-icon { width:48px; height:48px; border-radius:12px; background:linear-gradient(135deg,#6c63ff,#8b5cf6); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:22px; color:#fff; margin:0 auto 16px; box-shadow:0 4px 16px rgba(108,99,255,.3); }
  </style>
</head>
<body>
<div class="login-card card shadow-sm p-4">
  <div class="text-center mb-4">
    <div class="logo-icon">S</div>
    <h5 class="fw-bold mb-1">Admin Panel</h5>
    <p class="text-muted small">Login untuk akses manajemen SSO</p>
  </div>
  {% if error %}
  <div class="alert alert-danger py-2 small">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label small fw-semibold">Username atau Email</label>
      <input type="text" name="username" class="form-control" required autofocus placeholder="admin">
    </div>
    <div class="mb-3">
      <label class="form-label small fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn btn-primary w-100">
      <i class="bi bi-box-arrow-in-right me-2"></i>Login
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
